# xcodegen spec for Iris demo apps.
#
# Regenerate the .xcodeproj(s) after changing this file:
#     cd Apps && xcodegen generate
#
# The generated IrisDemo-iOS.xcodeproj is checked in alongside this file so
# contributors don't need xcodegen installed just to open + run the demo.
# Install only when editing project settings: `brew install xcodegen`.

name: IrisDemo-iOS

options:
    deploymentTarget:
        iOS: "26.0"
    developmentLanguage: en
    createIntermediateGroups: true
    generateEmptyDirectories: true
    minimumXcodeGenVersion: "2.45"
    # No bundleIdPrefix — PRODUCT_BUNDLE_IDENTIFIER comes from Local.xcconfig
    # (gitignored, per-developer). If bundleIdPrefix were set, xcodegen would
    # auto-fill PRODUCT_BUNDLE_IDENTIFIER as an inline target build setting,
    # which would override the xcconfig value at a higher precedence level.

packages:
    Iris:
        path: ..

targets:
    IrisDemo-iOS:
        type: application
        platform: iOS
        deploymentTarget: "26.0"
        sources:
            - path: IrisDemo-iOS
              excludes:
                  - "**/*.md"
                  - "Info.plist"
                  - "**/*.xcconfig"
                  - "**/*.xcconfig.template"
        # All build settings live in Shared.xcconfig (committed).
        # DEVELOPMENT_TEAM is layered in from Local.xcconfig (gitignored)
        # via `#include?` inside Shared.xcconfig.
        configFiles:
            Debug: IrisDemo-iOS/Shared.xcconfig
            Release: IrisDemo-iOS/Shared.xcconfig
        dependencies:
            - package: Iris
              product: Iris
